name: Release & Publish

on:
  push:
    branches: [main]
    paths-ignore:
      - 'package.json'
      - 'package-lock.json'
    tags-ignore:
      - 'v*' # Évite de boucler si un tag est poussé

concurrency:
  group: version-bump
  cancel-in-progress: true

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.version.outputs.bumped }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Generate Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Git config
        run: |
          git config user.name "gcyphrq-workflow-bot[bot]"
          git config user.email "gcyphrq-workflow-bot[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Bump version
        id: version
        run: |
          set -euo pipefail
          HEAD_TAG=$(git describe --exact-match --tags --match "v*" HEAD 2>/dev/null || echo "")
          if [ -n "$HEAD_TAG" ]; then
            echo "version=${HEAD_TAG#v}" >> "$GITHUB_OUTPUT"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "bumped=true" >> "$GITHUB_OUTPUT"

          LAST_TAG=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then RANGE="${LAST_TAG}..HEAD"; else RANGE="HEAD"; fi

          CURRENT_VERSION=$(node -p "require('./package.json').version")
          LAST_VERSION=""
          if [ -n "$LAST_TAG" ]; then LAST_VERSION=${LAST_TAG#v}; fi
          
          if [ -z "$LAST_VERSION" ] || [ "$CURRENT_VERSION" != "$LAST_VERSION" ]; then
            VERSION="$CURRENT_VERSION"
            if git tag -l "v$VERSION" | grep -q .; then exit 1; fi
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            git tag "v$VERSION"
            git push origin main --tags
            exit 0
          fi

          LEVEL="patch"
          if git log --format="%B" "$RANGE" | grep -qE '^BREAKING CHANGE'; then LEVEL="major"
          elif git log --format="%s" "$RANGE" | grep -qE '^[a-z]+(\([^)]*\))?!:'; then LEVEL="major"
          elif git log --format="%s" "$RANGE" | grep -qE '^feat:|^feat\('; then LEVEL="minor"; fi
          
          NEW=$(npm --no-git-tag-version version "$LEVEL")
          VERSION=${NEW#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          git add package.json package-lock.json
          git commit -m "chore: bump version to v$VERSION"
          git tag "v$VERSION"
          git push origin main --tags

  publish:
    needs: bump
    if: needs.bump.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ needs.bump.outputs.version }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.bump.outputs.version }}
          name: v${{ needs.bump.outputs.version }}
          generate_release_notes: true

      - name: Publish to npm
        run: npm publish --provenance --access public